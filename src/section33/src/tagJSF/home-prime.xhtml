<!DOCTYPE html>

<html   xmlns:h="http://java.sun.com/jsf/html"
        xmlns:f="http://java.sun.com/jsf/core"
        xmlns:ui="http://primefaces.org/ui">
    
    <h:head>
        <meta charset="ISO-8859-1"></meta>
        <title> Title </title>

        <h:outStylesheet name="body.css" library="css"></h:outStylesheet>
        <h:outStylesheet name="alert.js" library="css"></h:outStylesheet>
    </h:head>

    <h:body>
        <h1> Hello 1! </h1>

        <h:form>

            <br />
                    
            <ui:tabMenu activeIndex="#{param.tab}">
                <ui:menuitem value="Tab 1" outcome="home-prime">
                    <f:param name="tab" value="0"></f:param>
                </ui:menuitem>
                <ui:menuitem value="Tab 2" outcome="home-prime">
                    <f:param name="tab" value="1"></f:param>
                </ui:menuitem>
                <ui:menuitem value="Tab 3" outcome="home-prime">
                    <f:param name="tab" value="2"></f:param>
                </ui:menuitem>
            </ui:tabMenu>

            <br />
            <ui:menu>
                <br />

                <ui:submenu label="Menu1">

                    <ui:submenu label="subMenu1">
                        <ui:menuitem actionListener="#{hello.update}" value="Save" />
                        <ui:menuitem actionListener="#{hello.update}" value="Edit" />
                        <ui:menuitem actionListener="#{hello.update}" value="Update" />
                    </ui:submenu>

                </ui:submenu>

                <ui:submenu label="Menu1 extra">
                    <ui:menuitem actionListener="#{hello.update}" value="Save" />
                    <ui:menuitem actionListener="#{hello.update}" value="Edit" />
                    <ui:menuitem actionListener="#{hello.update}" value="Update" />
                </ui:submenu>

                <ui:submenu label="Menu2">
                    <ui:menuitem actionListener="#{hello.update}" value="Save" />
                    <ui:menuitem actionListener="#{hello.update}" value="Edit" />
                    <ui:menuitem actionListener="#{hello.update}" value="Update" />
                </ui:submenu>

                <ui:submenu label="Menu3">
                    <ui:menuitem actionListener="#{hello.update}" value="Save" />
                    <ui:menuitem actionListener="#{hello.update}" value="Edit" />
                    <ui:menuitem actionListener="#{hello.update}" value="Update" />
                </ui:submenu>

            </ui:menu>
            <br />
            <ui:contextMenu>
                <ui:menuitem actionListener="#{hello.update}" value="Save"></ui:menuitem>
                <ui:menuitem actionListener="#{hello.update}" value="Edit"></ui:menuitem>
                <ui:menuitem actionListener="#{hello.update}" value="Update"></ui:menuitem>
            </ui:contextMenu>
            <br />
            <ui:colorPicker value=""></ui:colorPicker>
            <br />
            <ui:chart type="bar" model="#{hello.barModel}"></ui:chart>


            <br />
            <ui:galleria var="img" value="#{hello.images}" panelWidth="500" panelHeight="500" showCaption="true">
                <ui:graphicImage name="img/#{img}" alt="Image #{img}" title="Title Image #{img}" />
            </ui:galleria>
            <br />

            <ui:carousel var="img" value="#{hello.images}" responsive="true">
                <ui:graphicImage name="img/#{img}" alt="Image #{img}" title="Title Image #{img}" />
            </ui:carousel>

            <br />
            <ui:orderList var="course" value="#{hello.options}" itemValue="course" itemLabel="course" controlsLocation="none"></ui:orderList>

            <br />
            <ui:breadCrumb>
                <ui:menuitem value="menu 1" url="#"></ui:menuitem>
                <ui:menuitem value="menu 2" url="#"></ui:menuitem>
                <ui:menuitem value="menu 3" url="#"></ui:menuitem>
                <ui:menuitem value="menu 4" url="#"></ui:menuitem>
                <ui:menuitem value="menu 5" url="#"></ui:menuitem>
            </ui:breadCrumb>
            <br />
            <ui:commandButton type="button" id="btnconfirm" value="Open confirm">
                <ui:confirm header="confirmation action" message="are you sure to the confirm?"></ui:confirm>
            </ui:commandButton>

            <ui:confirmDialog global="true" showEffect="fade" hideEffect="fade">
                <ui:commandButton type="button" value="Yes"></ui:commandButton>
                <ui:commandButton type="button" value="No"></ui:commandButton>
            </ui:confirmDialog>

            <br />
            <ui:commandButton type="button" id="btn" value="Open dialog"></ui:commandButton>
            <ui:overlayPanel for="btn" id="btnPanel" hideEffect="fade">
                <p> This sentence serves as testing </p>
                <p> This sentence serves as testing </p>
                <p> This sentence serves as testing </p>
            </ui:overlayPanel>

            <br />
            <ui:dialog widgetVar="alert" header="Title dialog">
                <ui:outputLabel value="Are you sure>"></ui:outputLabel>
            </ui:dialog>
            <ui:commandButton onclick="PF('alert').show();" type="button" value="Open"></ui:commandButton>

            <br />
            <ui:accordionPanel multiple="true">
                <ui:tab title="Panel 1">
                    <p> This sentence serves as testing </p>
                </ui:tab>
                <ui:tab title="Panel 2">
                    <p> This sentence serves as testing </p>
                </ui:tab>
                <ui:tab title="Panel 3">
                    <p> This sentence serves as testing </p>
                </ui:tab>
            </ui:accordionPanel>


            <br />
            <ui:inputMask mask="99/99/9999" value=""></ui:inputMask>
            <ui:calendar value="" mode="inline"></ui:calendar>
            <br />
            <ui:fieldset legend="text 1" toggleable="true" toggleSpeed="50">
                <p>
                    This sentence serves as testing...
                </p>
            </ui:fieldset>
            <ui:editor></ui:editor>
            <ui:inputText value="#{hello.name}"></ui:inputText>
            <br />
            <ui:commandButton actionListener="#{hello.update}" ajax="false" update="out" value="enter" icon="ui-icon-star"></ui:commandButton>
            <br />
            -<ui:outputLabel value="#{hello.name}" id="out"></ui:outputLabel>-
            <br />
            <ui:inputTextarea completeMethod="#{hello.search}" queryDelay="1" minQueryLength="3" counter="display" counterTemplate="{0} available characters"></ui:inputTextarea>
            <ui:outputLabel id="display"></ui:outputLabel>
            <br />
            <ui:inputNumber decimalSeparator="," thousandSeparator="." symbol="EUR" symbolPosition="s" value=""></ui:inputNumber>
            <br />
            <ui:inputSwitch value=""></ui:inputSwitch>
            <br />
            <ui:spinner value=""></ui:spinner>
            <br />
            <ui:password value="" feedback="true"></ui:password>
            <br />
            <ui:outputLabel for="pwd1" value="Password" />
            <ui:password id="pwd1" value="" match="pwd2"></ui:password>
            <br />
            <ui:outputLabel for="pdw2" value="confirm password" />
            <ui:password id="pdw2" value=""></ui:password>
            <br />
            <ui:commandButton actionListener="#{hello.update}" ajax="false" value="enter" icon="ui-icon-star"></ui:commandButton>
            <ui:selectCheckboxMenu label="select options" filter="true">
                <f:selectItems value="#{hello.options}"></f:selectItems>
            </ui:selectCheckboxMenu>
        </h:form>
    </h:body>
</html>
